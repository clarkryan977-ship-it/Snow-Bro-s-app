services:
  - type: web
    name: snowbros
    runtime: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        value: snowbros-jwt-secret-2026-production
    disk:
      name: snowbros-data
      mountPath: /opt/render/project/src/server/db
      sizeGB: 1
